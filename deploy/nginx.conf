# 聚合导航页 - Nginx 配置
# 将此文件放到 /etc/nginx/conf.d/nav.conf 或 /etc/nginx/sites-available/nav

# ============================================================
# 子域名方式部署（推荐）: nav.yourdomain.com
# 这种方式与主域名完全隔离，不会影响其他网站
# ============================================================

server {
    listen 80;
    server_name links.tbaosearch.asia;  # 替换为你的子域名

    client_max_body_size 10m;

    # 前端静态文件
    root /opt/nav-site/dist;
    index index.html;

    # 前端路由 - SPA history 模式
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    access_log /var/log/nginx/nav-access.log;
    error_log  /var/log/nginx/nav-error.log;
}

